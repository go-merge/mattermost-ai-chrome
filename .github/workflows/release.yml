name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Zip dist
        run: cd dist && zip -r "../mattermost-ai-chrome-${{ github.ref_name }}.zip" .

      - uses: softprops/action-gh-release@v2
        with:
          files: mattermost-ai-chrome-${{ github.ref_name }}.zip
          generate_release_notes: true
